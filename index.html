<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Pro Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.1);
            --arrow-hover: rgba(255, 255, 255, 0.3);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #0f0f0f; /* Darker, more premium */
            font-family: sans-serif;
        }
        
        #viewport {
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; position: relative;
        }

        /* The Book Container */
        #my-book {
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            background: #fff;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* SaaS Style Navigation Arrows - Placed at the very edges to save space */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--arrow-bg); border: none; color: white;
            width: 50px; height: 80px; /* Taller arrows */
            border-radius: 8px;
            cursor: pointer; z-index: 1000; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s ease; backdrop-filter: blur(10px);
            font-size: 24px; user-select: none;
        }
        .nav-btn:hover { background: var(--arrow-hover); width: 60px; }
        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; font-size: 16px;
        }
    </style>
</head>
<body>

<div id="loader">BUILDING BOOK...<br><span id="load-val">0%</span></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const PDF_SOURCE = "PASTE_YOUR_GITHUB_PDF_LINK_HERE"; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let inputUrl = urlParams.get('pdf') || urlParams.get('id') || PDF_SOURCE;
        let finalUrl = inputUrl;

        if (finalUrl.includes("github.com") && !finalUrl.includes("raw.githubusercontent.com")) {
            finalUrl = finalUrl.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        } else if (!finalUrl.includes("/") && finalUrl.length > 15) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${finalUrl}`);
        }

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            const firstPage = await pdf.getPage(1);
            const vp = firstPage.getViewport({ scale: 1 });
            const ratio = vp.width / vp.height;

            // --- THE SIZE FIX ---
            // We use 95% of the screen height as our primary limit
            let viewH = window.innerHeight * 0.95;
            let viewW = viewH * ratio;

            // If the two-page spread is wider than 90% of the screen, we shrink based on width instead
            if (viewW * 2 > window.innerWidth * 0.90) {
                viewW = (window.innerWidth * 0.90) / 2;
                viewH = viewW / ratio;
            }

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                // Render at high resolution (Scale 2.5) for text clarity
                const renderVP = page.getViewport({ scale: 2.5 }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                canvas.height = renderVP.height;
                canvas.width = renderVP.width;

                await page.render({ canvasContext: context, viewport: renderVP }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                document.getElementById('load-val').innerText = Math.round((i/pdf.numPages)*100) + "%";
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed",
                minWidth: 200,
                maxWidth: 2000,
                minHeight: 200,
                maxHeight: 2000,
                drawShadow: true,
                showCover: true, // Page 1 is cover (on the right)
                usePortrait: false,
                flippingTime: 700,
                useMouseEvents: true,
                clickEventForward: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "FAILED TO LOAD PDF";
        }
    }

    init();

    window.addEventListener('resize', () => {
        let timeout;
        clearTimeout(timeout);
        timeout = setTimeout(() => location.reload(), 400);
    });
</script>
</body>
</html>
