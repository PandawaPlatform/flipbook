<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Flipbook Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        
        /* The container for the flipbook */
        #my-book { margin: auto; }

        .page { background: white; width: 100%; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* CSS FIX: Prevents text blur by using sharp scaling math */
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text">Calibrating Dimensions...</div>
</div>

<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const log = (msg) => console.log(`[Flipbook Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";
        if (fileUrl) {
            let cleanPath = decodeURIComponent(fileUrl);
            if (cleanPath.includes("github.com") && cleanPath.includes("/blob/")) {
                finalUrl = cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            } else if (cleanPath.startsWith("http")) {
                finalUrl = cleanPath;
            } else {
                const currentDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                finalUrl = currentDir + "/" + cleanPath;
            }
            finalUrl = encodeURI(finalUrl);
        } else if (driveId) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        } else {
            document.getElementById('load-text').innerText = "Error: No PDF source specified.";
            return;
        }

        try {
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            bookDiv.innerHTML = ''; 

            // STEP 1: Get actual PDF dimensions from the first page
            const firstPage = await pdf.getPage(1);
            const originalViewport = firstPage.getViewport({ scale: 1 });
            
            // These are the "Natural" dimensions of your PDF
            const pdfWidth = originalViewport.width;
            const pdfHeight = originalViewport.height;
            
            // STEP 2: Calculate the best rendering scale for sharpness
            // We use a high scale for the internal canvas, but fit it to the UI
            const renderScale = 3.0; 

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: renderScale }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false, desynchronized: true });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ 
                    canvasContext: context, 
                    viewport: viewport,
                    intent: 'print' 
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('canvas-container').style.opacity = '1';
            
            // STEP 3: Initialize with DYNAMIC dimensions
            const pageFlip = new St.PageFlip(bookDiv, {
                width: pdfWidth, 
                height: pdfHeight,
                size: "stretch", // Stretch now works correctly because the ratio is exact
                minWidth: 300,
                maxWidth: 1000,
                minHeight: 400,
                maxHeight: 1400,
                showCover: true, 
                usePortrait: true, 
                mobileScrollSupport: true,
                maxShadowOpacity: 0.1
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            log("Flipbook loaded with correct Aspect Ratio!");
            
        } catch (err) {
            document.getElementById('load-text').innerHTML = `<span style="color:red">Failed to load PDF.</span><br><small>${err.message}</small>`;
        }
    }
    init();
</script>
</body>
</html>
