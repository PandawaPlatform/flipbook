<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipOS 2026 | Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        #canvas-container { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        .page { background: white; width: 100%; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

<div id="loader">Loading Flipbook...</div>
<div id="canvas-container">
    <div id="my-book"></div>
</div>

<script>
   const pdfjsLib = window['pdfjs-dist/build/pdf'];
    // Using a more reliable worker source for 2026
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id');

    if (!driveId) {
        document.getElementById('loader').innerText = "Error: No Google Drive ID provided in the URL.";
    } else {
        initFlipbook(driveId);
    }

    async function initFlipbook(id) {
        const loader = document.getElementById('loader');
        
        // We will try two different proxy services in case one is down
        const proxies = [
            `https://api.allorigins.win/raw?url=`,
            `https://corsproxy.io/?`
        ];

        let success = false;

        for (let proxy of proxies) {
            if (success) break;
            
            try {
                const driveUrl = `https://drive.google.com/uc?export=download&id=${id}`;
                const finalUrl = proxy + encodeURIComponent(driveUrl);
                
                loader.innerText = `Attempting to fetch PDF (Proxy ${proxies.indexOf(proxy) + 1})...`;

                const loadingTask = pdfjsLib.getDocument({
                    url: finalUrl,
                    // These settings help bypass "Range" request errors common with Google Drive
                    disableRange: true,
                    disableAutoFetch: true
                });

                loadingTask.onProgress = (p) => {
                    const percent = Math.round((p.loaded / p.total) * 100);
                    loader.innerText = isNaN(percent) ? "Downloading..." : `Loading: ${percent}%`;
                };

                const pdf = await loadingTask.promise;
                success = true; // If we reach here, the proxy worked!
                
                const bookDiv = document.getElementById('my-book');
                bookDiv.innerHTML = ''; 

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.appendChild(canvas);
                    bookDiv.appendChild(pageDiv);
                }

                loader.style.display = 'none';

                const pageFlip = new St.PageFlip(bookDiv, {
                    width: 550, height: 800, size: "stretch",
                    showCover: true, usePortrait: true, mobileScrollSupport: true
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                
            } catch (err) {
                console.error(`Proxy ${proxy} failed:`, err);
                // Continue to next proxy in loop
            }
        }

        if (!success) {
            loader.innerHTML = `
                <div style="color: #ff6b6b; padding: 20px; border: 1px solid #ff6b6b; border-radius: 10px;">
                    <strong>Connection Failed</strong><br>
                    Google Drive is blocking the automated reader.<br><br>
                    <small>Reason: The file might be too large (>50MB) or Google's security is blocking the request. 
                    Try checking the console (F12) for more details.</small>
                </div>`;
        }
    }</script>
</body>
</html>
