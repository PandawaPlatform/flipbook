<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Flipbook Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        
        #my-book { width: 95%; height: 95%; } /* Let the container define the bounds */

        .page { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* FIX: Remove forced 100% to let the internal engine control sharpness */
        canvas { 
            display: block;
            image-rendering: high-quality;
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text">Sharpening Content...</div>
</div>

<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const log = (msg) => console.log(`[Flipbook Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";
        if (fileUrl) {
            let cleanPath = decodeURIComponent(fileUrl);
            if (cleanPath.includes("github.com")) {
                finalUrl = cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            } else {
                const currentDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                finalUrl = currentDir + "/" + cleanPath;
            }
            finalUrl = encodeURI(finalUrl);
        } else if (driveId) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        }

        try {
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            bookDiv.innerHTML = ''; 

            const firstPage = await pdf.getPage(1);
            const viewportBase = firstPage.getViewport({ scale: 1 });
            
            // DPR scaling is the secret to non-blurry text
            const dpr = window.devicePixelRatio || 1;
            const scale = 2.0; // 2.0 is the sweet spot for speed and HD quality

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: scale }); 
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // Manual pixel correction for crystal clear text
                canvas.style.width = "100%";
                canvas.style.height = "100%";

                await page.render({ 
                    canvasContext: context, 
                    viewport: viewport,
                    intent: 'print'
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('canvas-container').style.opacity = '1';
            
            // Use STRETCH size with the PDF's native proportions
            const pageFlip = new St.PageFlip(bookDiv, {
                width: viewportBase.width, 
                height: viewportBase.height,
                size: "stretch", 
                showCover: true, 
                usePortrait: true, // Auto-switches between 1 and 2 pages based on screen width
                mobileScrollSupport: true,
                maxShadowOpacity: 0.2,
                showPageCorners: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
        } catch (err) {
            document.getElementById('load-text').innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        }
    }
    init();
</script>
</body>
</html>
