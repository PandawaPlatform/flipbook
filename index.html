<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root { --arrow-bg: rgba(0, 0, 0, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; }
        
        /* THE VIEWPORT - Ensures everything is centered */
        #viewport { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            perspective: 2000px; /* Adds 3D depth for the flip */
        }

        #my-book { 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
            background: #fff; 
            visibility: hidden; 
        }

        .page { background: white; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: var(--arrow-bg); border: none; color: white; 
            width: 55px; height: 55px; border-radius: 50%; 
            cursor: pointer; z-index: 100; display: flex; 
            align-items: center; justify-content: center; 
            transition: 0.3s; font-size: 24px; 
        }
        .nav-btn:hover { background: #000; transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: 15px; } 
        .btn-next { right: 15px; }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; z-index: 999; 
        }
        .loading-spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid #2563eb; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="loading-spinner"></div>
    <div id="status-text">Synchronizing...</div>
</div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const pdfFileName = decodeURIComponent(urlParams.get('pdf') || '');

    async function init() {
        if (!pdfFileName) {
            document.getElementById('status-text').innerHTML = "Error: No File Selected";
            return;
        }

        try {
            const pdf = await pdfjsLib.getDocument(pdfFileName).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 1. GET ACTUAL PDF DIMENSIONS
            const firstPage = await pdf.getPage(1);
            const originalViewport = firstPage.getViewport({ scale: 1 });
            
            // IMPORTANT: Handle rotation correctly
            const isLandscape = originalViewport.width > originalViewport.height;
            const pdfRatio = originalViewport.width / originalViewport.height;

            // 2. CALCULATE OPTIMAL SIZE
            // We want the book to fill 90% of the available height or width
            const containerW = window.innerWidth;
            const containerH = window.innerHeight;
            
            let finalH = containerH * 0.92;
            let finalW = finalH * pdfRatio;

            // Safety: if two pages (spread) are wider than the screen, shrink to fit width
            if ((finalW * 2) > containerW * 0.85) {
                finalW = (containerW * 0.85) / 2;
                finalH = finalW / pdfRatio;
            }

            // 3. RENDER PAGES
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                // Render at high resolution (scale 2)
                const renderViewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ 
                    canvasContext: canvas.getContext('2d'), 
                    viewport: renderViewport 
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                
                document.getElementById('status-text').innerText = `Processing: ${Math.round((i/pdf.numPages)*100)}%`;
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            // 4. START FLIPBOOK
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(finalW),
                height: Math.round(finalH),
                size: "fixed",
                showCover: true,
                drawShadow: true,
                maxShadowOpacity: 0.5,
                useMouseEvents: true,
                flippingTime: 1000
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            document.getElementById('status-text').innerHTML = `<div style="color:#ff4d4d">FAILED: ${err.message}</div>`;
        }
    }

    init();

    // Prevent annoying reload loop but fix layout on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => location.reload(), 500);
    });
</script>
</body>
</html>
