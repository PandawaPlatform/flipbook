<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root { --arrow-bg: rgba(0, 0, 0, 0.4); --arrow-hover: rgba(0, 0, 0, 0.7); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; }
        #viewport { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; position: relative; }
        #my-book { box-shadow: 0 0 50px rgba(0,0,0,0.8); background: #fff; visibility: hidden; }
        .page { background: white; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--arrow-bg); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 20px; }
        .nav-btn:hover { background: var(--arrow-hover); transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: 20px; } .btn-next { right: 20px; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; }
        .err-msg { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader"><div id="status-text">Initializing Engine...</div></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const pdfFileName = urlParams.get('pdf'); // Expecting just the filename, e.g., "Pengantar Awal.pdf"

    async function init() {
        if (!pdfFileName) {
            document.getElementById('status-text').innerHTML = "No PDF filename provided.";
            return;
        }

        // Use the relative path. Since index.html and PDF are in same folder, 
        // we just need the encoded filename.
        const finalUrl = encodeURIComponent(pdfFileName);

        try {
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            
            // Calculate dimensions based on first page
            const firstPage = await pdf.getPage(1);
            const originalViewport = firstPage.getViewport({ scale: 1 });
            const ratio = originalViewport.width / originalViewport.height;

            let viewH = window.innerHeight * 0.9;
            let viewW = viewH * ratio;

            // Ensure it fits screen width
            if (viewW > window.innerWidth * 0.45) {
                viewW = window.innerWidth * 0.45;
                viewH = viewW / ratio;
            }

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getViewport({ scale: 2 }); // High quality render
                const canvas = document.createElement('canvas');
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ 
                    canvasContext: canvas.getContext('2d'), 
                    viewport: renderViewport 
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                
                document.getElementById('status-text').innerText = `Loading: ${Math.round((i/pdf.numPages)*100)}%`;
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed",
                minWidth: 300,
                maxWidth: 1000,
                minHeight: 400,
                maxHeight: 1500,
                showCover: true,
                mobileScrollSupport: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('status-text').innerHTML = 
                `<div class='err-msg'>CANNOT LOAD PDF</div>
                 <p style='font-size:12px;'>Check if <b>${pdfFileName}</b> exists in the GitHub folder.</p>`;
        }
    }

    init();
</script>
</body>
</html>
