<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
        }

        .page { background: white; overflow: hidden; }
        
        /* THE SHARPNESS FIX: Prevents the browser from blurring the high-res canvas */
        canvas { 
            width: 100%; height: 100%; 
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="loader" id="load-block">Loading...</div>
<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const fileUrl = urlParams.get('pdf');
    const driveId = urlParams.get('id');

    async function init() {
        let finalUrl = "";
        if (fileUrl) {
            let cleanPath = decodeURIComponent(fileUrl);
            finalUrl = cleanPath.includes("github.com") ? cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/") : window.location.href.substring(0, window.location.href.lastIndexOf('/')) + "/" + cleanPath;
            finalUrl = encodeURI(finalUrl);
        } else if (driveId) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        }

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 1. Get the shape of your PDF immediately
            const firstPage = await pdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            const ratio = viewport.width / viewport.height;

            // 2. Lock the display size so it NEVER jumps or scrolls
            const viewH = window.innerHeight * 0.9;
            const viewW = viewH * ratio;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                // Scale 2.0 + DPR is the sweet spot for crisp text without lag
                const renderViewport = page.getViewport({ scale: 2 * (window.devicePixelRatio || 1) });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport, intent: 'print' }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';

            // 3. FIXED SIZE initialization (Stops the "go to top and back" jump)
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", 
                minWidth: Math.round(viewW),
                minHeight: Math.round(viewH),
                maxWidth: Math.round(viewW),
                maxHeight: Math.round(viewH),
                showCover: true,
                usePortrait: false, // Prevents orientation jumping
                mobileScrollSupport: false, // Stops the browser from trying to scroll
                flippingTime: 800
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
        } catch (err) {
            document.getElementById('loader').innerHTML = "Error loading PDF";
        }
    }
    init();
</script>
</body>
</html>
