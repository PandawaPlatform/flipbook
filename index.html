<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.15);
            --arrow-hover: rgba(255, 255, 255, 0.3);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; 
            font-family: sans-serif;
        }
        
        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* The Flipbook Wrapper */
        #my-book {
            box-shadow: 0 0 100px rgba(0,0,0,0.7);
            background: #fff;
            visibility: hidden;
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* SaaS Style Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--arrow-bg);
            border: none;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 30px;
            user-select: none;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 40px; }
        .btn-next { right: 40px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); color: white; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loader">Loading High-Res PDF...</div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id') || '1YAn3Oclw9G6_S-pX1Z9_H5U9n_vL9O7v';

    async function init() {
        // Correcting the URL proxy to ensure Google Drive works without CORS errors
        const finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 1. Setup Canvas Dimensions for 2-page spread
            const firstPage = await pdf.getPage(1);
            const originalViewport = firstPage.getViewport({ scale: 1 });
            const ratio = originalViewport.width / originalViewport.height;

            // Target 85% of screen height to leave room for padding
            let viewH = window.innerHeight * 0.85;
            let viewW = viewH * ratio;

            // Check if two pages (Landscape) will fit on screen width
            if (viewW * 2 > window.innerWidth * 0.85) {
                viewW = (window.innerWidth * 0.85) / 2;
                viewH = viewW / ratio;
            }

            // 2. Render Loop (Scale 3 for Ultra-Sharp Text)
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getViewport({ scale: 3 }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            // 3. PageFlip Config - FIXED SIZE is the secret to stopping the jump
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", 
                minWidth: 300,
                maxWidth: 2000,
                minHeight: 400,
                maxHeight: 2000,
                drawShadow: true,
                showCover: true,
                usePortrait: false,
                flippingTime: 800,
                useMouseEvents: true,
                clickEventForward: false // Stops text selection from flipping page
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 4. Button Controls
            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "ERROR: CHECK DRIVE PERMISSIONS";
        }
    }

    init();

    // Refresh on resize to recalculate "Safe Zone"
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => location.reload(), 300);
    });
</script>
</body>
</html>
