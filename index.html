<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.1);
            --arrow-hover: rgba(255, 255, 255, 0.25);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; 
            font-family: sans-serif;
        }
        
        /* Centered Viewport */
        #viewport {
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; position: relative;
        }

        /* The Book Container */
        #my-book {
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            background: #fff;
            visibility: hidden; /* Hide until fully rendered to prevent jumping */
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* SaaS Style Navigation Arrows */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--arrow-bg); border: none; color: white;
            width: 65px; height: 65px; border-radius: 50%;
            cursor: pointer; z-index: 1000; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.3s ease; backdrop-filter: blur(5px);
            font-size: 26px; user-select: none;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 25px; }
        .btn-next { right: 25px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; font-size: 14px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="loader">PREPARING HIGH-RES PAGES...<br><span id="load-val">0%</span></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    // --- STEP 1: PASTE YOUR PDF LINK HERE ---
    // If it's a GitHub link, the code will automatically convert it to a "Raw" link for you.
    const PDF_SOURCE = "PASTE_YOUR_GITHUB_PDF_LINK_HERE"; 
    // ----------------------------------------

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let inputUrl = urlParams.get('pdf') || urlParams.get('id') || PDF_SOURCE;
        
        let finalUrl = inputUrl;

        // Auto-fix GitHub links to RAW format so they actually load
        if (finalUrl.includes("github.com") && !finalUrl.includes("raw.githubusercontent.com")) {
            finalUrl = finalUrl.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        } 
        // If it looks like a Google Drive ID, use the proxy
        else if (!finalUrl.includes("/") && finalUrl.length > 15) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${finalUrl}`);
        }

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            const firstPage = await pdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            const ratio = viewport.width / viewport.height;

            // SIZE FIX: Maximized to 98% of viewport
            let viewH = window.innerHeight * 0.98;
            let viewW = viewH * ratio;

            if (viewW * 2 > window.innerWidth * 0.98) {
                viewW = (window.innerWidth * 0.98) / 2;
                viewH = viewW / ratio;
            }

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getViewport({ scale: 2 }); // Scale 2 is the sweet spot for GitHub speed + sharpness
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                document.getElementById('load-val').innerText = Math.round((i/pdf.numPages)*100) + "%";
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", // This STOPS the jumpy "top-left" bug
                drawShadow: true,
                showCover: true,
                usePortrait: false,
                flippingTime: 800,
                mobileScrollSupport: false,
                clickEventForward: false,
                useMouseEvents: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "ERROR: LINK BLOCKED OR INVALID.<br>Check console for details.";
        }
    }

    init();

    // Prevent the jump-on-resize bug
    window.addEventListener('resize', () => {
        let timeout;
        clearTimeout(timeout);
        timeout = setTimeout(() => location.reload(), 500);
    });
</script>
</body>
</html>
