<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.1);
            --arrow-hover: rgba(255, 255, 255, 0.25);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: radial-gradient(circle, #2c2c2c 0%, #121212 100%); 
            font-family: sans-serif;
        }
        
        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #my-book {
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            background: #fff;
            visibility: hidden;
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--arrow-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 24px;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 30px; }
        .btn-next { right: 30px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); color: white; 
        }
    </style>
</head>
<body>

<div id="loader">Loading PDF Document...</div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    
    <div id="my-book"></div>

    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id') || '1YAn3Oclw9G6_S-pX1Z9_H5U9n_vL9O7v';

    async function init() {
        const finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 1. Better Aspect Ratio Calculation (Anti-Stretch)
            const firstPage = await pdf.getPage(1);
            const pdfViewport = firstPage.getViewport({ scale: 1 });
            const pdfRatio = pdfViewport.width / pdfViewport.height;

            // Calculate space available
            let containerW = window.innerWidth * 0.9;
            let containerH = window.innerHeight * 0.9;
            let viewW, viewH;

            // Logic to fit PDF ratio into screen without stretching
            if (containerW / containerH > pdfRatio * 2) {
                viewH = containerH;
                viewW = viewH * pdfRatio;
            } else {
                viewW = containerW / 2;
                viewH = viewW / pdfRatio;
            }

            // 2. Render High-Quality Pages
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getViewport({ scale: 2 }); // Keep High DPI
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            // 3. Fixed PageFlip Configuration (FlowPaper Style)
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", // CRITICAL: Changed from 'stretch' to 'fixed' to stop stretching
                minWidth: 300,
                maxWidth: 2000,
                minHeight: 400,
                maxHeight: 2000,
                drawShadow: true,
                showCover: true,
                usePortrait: window.innerWidth < 768, // Auto-switch for mobile
                startPage: 0,
                flippingTime: 1000,
                mobileScrollSupport: false,
                clickEventForward: false,
                useMouseEvents: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 4. Arrow Navigation Logic
            document.getElementById('prevBtn').addEventListener('click', () => {
                pageFlip.flipPrev();
            });
            document.getElementById('nextBtn').addEventListener('click', () => {
                pageFlip.flipNext();
            });

            pageFlip.on('flip', (e) => {
                console.log("Current page: " + e.data);
            });

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "Error loading PDF. Please check Drive permissions.";
        }
    }

    init();

    window.addEventListener('resize', () => {
        location.reload(); 
    });
</script>
</body>
</html>
