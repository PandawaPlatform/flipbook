<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.1);
            --arrow-hover: rgba(255, 255, 255, 0.25);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; 
            font-family: sans-serif;
        }
        #viewport {
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; position: relative;
        }
        #my-book { box-shadow: 0 0 50px rgba(0,0,0,0.5); background: #fff; visibility: hidden; }
        .page { background: white; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: -webkit-optimize-contrast; }
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--arrow-bg); border: none; color: white;
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; backdrop-filter: blur(5px); font-size: 24px;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 30px; } .btn-next { right: 30px; }
        #loader { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); color: white; text-align: center;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="status-text">Building Flipbook...</div>
</div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const githubFile = urlParams.get('pdf');
    const driveId = urlParams.get('id');

    async function init() {
        let sourceUrl = '';
        if (githubFile) {
            sourceUrl = `https://raw.githubusercontent.com/PandawaPlatform/flipbook/main/${encodeURIComponent(githubFile)}`;
        } else if (driveId) {
            sourceUrl = `https://drive.google.com/uc?export=download&id=${driveId}`;
        } else {
            document.getElementById('status-text').innerHTML = "No source found.";
            return;
        }

        const finalUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(sourceUrl)}`;

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 1. Setup Dimensions
            const firstPage = await pdf.getPage(1);
            const tempViewport = firstPage.getViewport({ scale: 1 });
            const ratio = tempViewport.width / tempViewport.height;

            let viewH = window.innerHeight * 0.95;
            let viewW = viewH * ratio;
            if (viewW > window.innerWidth * 0.45) {
                viewW = window.innerWidth * 0.45;
                viewH = viewW / ratio;
            }

            // 2. Faster Page Building Loop
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                // SPEED FIX: Scale 1.5 is significantly faster than 2.0
                const renderViewport = page.getPageViewport({ scale: 1.5 }); 
                const canvas = document.createElement('canvas');
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ 
                    canvasContext: canvas.getContext('2d', { alpha: false }), 
                    viewport: renderViewport 
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                
                // Update status for user
                if(i % 5 === 0) document.getElementById('status-text').innerText = `Loading: ${i}/${pdf.numPages}`;
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", 
                minWidth: 300,
                maxWidth: 2000,
                minHeight: 400,
                maxHeight: 2000,
                drawShadow: true,
                showCover: true,
                usePortrait: false,
                flippingTime: 800,
                useMouseEvents: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('status-text').innerHTML = "Failed to load PDF.";
        }
    }

    init();
    window.addEventListener('resize', () => location.reload());
</script>
</body>
</html>
