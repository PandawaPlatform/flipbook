<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root { --arrow-bg: rgba(0, 0, 0, 0.4); --arrow-hover: rgba(0, 0, 0, 0.7); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; font-family: sans-serif; }
        #viewport { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; position: relative; }
        #my-book { margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.8); background: #fff; visibility: hidden; }
        .page { background: white; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--arrow-bg); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 20px; }
        .nav-btn:hover { background: var(--arrow-hover); transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: 20px; } .btn-next { right: 20px; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 1000; }
        .err-msg { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader"><div id="status-text">Initializing Engine...</div></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    // Use decodeURIComponent to handle spaces in the filename from the URL
    const pdfFileName = decodeURIComponent(urlParams.get('pdf') || '');

    async function init() {
        if (!pdfFileName) {
            document.getElementById('status-text').innerHTML = "No PDF filename provided.";
            return;
        }

        try {
            document.getElementById('status-text').innerText = "Fetching PDF...";
            
            // We use the raw filename because index.html is in the same folder
            const pdf = await pdfjsLib.getDocument(pdfFileName).promise;
            const bookDiv = document.getElementById('my-book');
            
            const firstPage = await pdf.getPage(1);
            const pdfViewport = firstPage.getViewport({ scale: 1 });
            const ratio = pdfViewport.width / pdfViewport.height;

            // Calculate sizes
            let viewH = window.innerHeight * 0.95;
            let viewW = viewH * ratio;

            // If two pages side-by-side are wider than screen, shrink to fit width
            if ((viewW * 2) > window.innerWidth * 0.9) {
                viewW = (window.innerWidth * 0.9) / 2;
                viewH = viewW / ratio;
            }

            // Render all pages
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getViewport({ scale: 2 }); // High quality
                const canvas = document.createElement('canvas');
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ 
                    canvasContext: canvas.getContext('2d'), 
                    viewport: renderViewport 
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
                
                document.getElementById('status-text').innerText = `Loading: ${Math.round((i/pdf.numPages)*100)}%`;
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            // Initialize Flipbook
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW), 
                height: Math.round(viewH),
                size: "fixed",
                minWidth: 200,
                maxWidth: 2000,
                minHeight: 200,
                maxHeight: 2000,
                showCover: true,
                drawShadow: true,
                useMouseEvents: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error("PDF Load Error:", err);
            document.getElementById('status-text').innerHTML = 
                `<div class='err-msg'>CANNOT LOAD PDF</div>
                 <p style='font-size:12px;'>Detail: ${err.message}<br>File: <b>${pdfFileName}</b></p>`;
        }
    }

    init();
</script>
</body>
</html>
