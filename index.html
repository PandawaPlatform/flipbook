<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Flipbook Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.15);
            --arrow-hover: rgba(255, 255, 255, 0.3);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; 
            font-family: sans-serif;
        }
        
        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #my-book {
            box-shadow: 0 0 100px rgba(0,0,0,0.7);
            background: #fff;
            visibility: hidden;
            z-index: 5;
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* SaaS Style Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--arrow-bg);
            border: none;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 28px;
            user-select: none;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 30px; }
        .btn-next { right: 30px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); color: white; 
            font-weight: bold; text-align: center;
        }
    </style>
</head>
<body>

<div id="loader">RENDERING PAGES...<br><small id="prog">0%</small></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    // --- CONFIGURATION ---
    // 1. If using GitHub: Put the RAW URL here
    // 2. If using Drive: Put the ID here
    const DEFAULT_SOURCE = "1YAn3Oclw9G6_S-pX1Z9_H5U9n_vL9O7v"; 
    // ---------------------

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let source = urlParams.get('id') || urlParams.get('pdf') || DEFAULT_SOURCE;
        
        let finalUrl = source;
        // If it's just a Drive ID (no slash/dot), format it
        if (!source.includes('/') && !source.includes('.')) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${source}`);
        }

        try {
            const pdf = await pdfjsLib.getDocument(finalUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            const firstPage = await pdf.getPage(1);
            const originalViewport = firstPage.getViewport({ scale: 1 });
            const ratio = originalViewport.width / originalViewport.height;

            // SAFE ZONE CALCULATION: Fills as much of the screen as possible
            let viewH = window.innerHeight * 0.90; 
            let viewW = viewH * ratio;

            // Ensure double-page spread doesn't hit the side arrows
            if (viewW * 2 > window.innerWidth * 0.80) {
                viewW = (window.innerWidth * 0.80) / 2;
                viewH = viewW / ratio;
            }

            for (let i = 1; i <= pdf.numPages; i++) {
                document.getElementById('prog').innerText = Math.round((i/pdf.numPages)*100) + "%";
                const page = await pdf.getPage(i);
                
                // Scale 3 = Ultra HD Readability
                const renderViewport = page.getViewport({ scale: 3 }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(viewW),
                height: Math.round(viewH),
                size: "fixed", 
                drawShadow: true,
                showCover: true,
                usePortrait: false,
                flippingTime: 800,
                useMouseEvents: true,
                clickEventForward: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "FAILED TO LOAD PDF<br>CHECK SOURCE URL";
        }
    }

    init();

    // Fixes the resize/jump issue
    window.addEventListener('resize', () => {
        let timer;
        clearTimeout(timer);
        timer = setTimeout(() => location.reload(), 400);
    });
</script>
</body>
</html>
