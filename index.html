<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root { --bg-color: #1a1a1a; --btn-bg: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); font-family: sans-serif; }
        
        #viewport { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; position: relative; 
        }

        #my-book { background: transparent; visibility: hidden; }

        .page { background: white; overflow: hidden; }
        
        /* THE FIX FOR BLURRY TEXT: Forces browser to render pixels sharply */
        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            image-rendering: -webkit-optimize-contrast; /* Safari/Chrome sharpness */
            image-rendering: crisp-edges;               /* Firefox sharpness */
            -ms-interpolation-mode: nearest-neighbor;   /* IE sharpness */
        }

        .nav-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: var(--btn-bg); border: none; color: white; 
            width: 50px; height: 50px; border-radius: 50%; 
            cursor: pointer; z-index: 100; display: flex; 
            align-items: center; justify-content: center; 
            transition: 0.3s; font-size: 20px; backdrop-filter: blur(8px);
        }
        .nav-btn:hover { background: rgba(255,255,255,0.25); scale: 1.1; }
        .btn-prev { left: 20px; } .btn-next { right: 20px; }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-color); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; z-index: 999; 
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="status">HD Rendering...</div></div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn" style="display:none">❮</button>
    <div id="my-book"></div>
    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const params = new URLSearchParams(window.location.search);
    const pdfUrl = decodeURIComponent(params.get('pdf') || '');

    async function start() {
        if (!pdfUrl) { document.getElementById('status').innerText = "No PDF Found"; return; }

        try {
            const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            const firstPage = await pdf.getPage(1);
            const vp = firstPage.getViewport({ scale: 1 });
            const pdfRatio = vp.width / vp.height;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            let bookH = winH * 0.94; // Optimized for 85vh container
            let bookW = bookH * pdfRatio;

            if ((bookW * 2) > winW * 0.95) {
                bookW = (winW * 0.95) / 2;
                bookH = bookW / pdfRatio;
            }

            // High Definition Rendering Logic
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { alpha: false }); // Better performance
                
                // Increase scale to 3 for much sharper text
                const hdViewport = page.getViewport({ scale: 3 });
                canvas.height = hdViewport.height;
                canvas.width = hdViewport.width;

                await page.render({ 
                    canvasContext: ctx, 
                    viewport: hdViewport,
                    intent: 'print' // Optimizes for text clarity
                }).promise;

                const div = document.createElement('div');
                div.className = 'page';
                if (i === 1 || i === pdf.numPages) div.setAttribute('data-density', 'hard');
                
                div.appendChild(canvas);
                bookDiv.appendChild(div);
                
                document.getElementById('status').innerText = `Enhancing: ${Math.round((i/pdf.numPages)*100)}%`;
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(bookW),
                height: Math.round(bookH),
                size: "fixed",
                showCover: true,
                drawShadow: true,
                maxShadowOpacity: 0.15,
                flippingTime: 800,
                useMouseEvents: true,
                startPage: 0,
                autoSize: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

            // Smart Navigation Button Visibility
            pageFlip.on('flip', (e) => {
                document.getElementById('prevBtn').style.display = (e.data === 0) ? "none" : "flex";
                document.getElementById('nextBtn').style.display = (e.data === pdf.numPages - 1) ? "none" : "flex";
            });

        } catch (e) {
            document.getElementById('status').innerHTML = `<span style="color:red">Error: ${e.message}</span>`;
        }
    }

    start();

    let t;
    window.onresize = () => { clearTimeout(t); t = setTimeout(() => location.reload(), 500); };
</script>
</body>
</html>
