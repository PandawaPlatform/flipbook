<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pandawa Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --arrow-bg: rgba(255, 255, 255, 0.1);
            --arrow-hover: rgba(255, 255, 255, 0.25);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #121212; 
            font-family: sans-serif;
        }
        
        #viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #my-book {
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #fff;
            visibility: hidden;
        }

        .page { background: white; overflow: hidden; }
        
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--arrow-bg);
            border: none;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-size: 24px;
        }
        .nav-btn:hover { background: var(--arrow-hover); scale: 1.1; }
        .btn-prev { left: 30px; }
        .btn-next { right: 30px; }

        #loader { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); color: white; 
        }
    </style>
</head>
<body>

<div id="loader">Loading PDF Document...</div>

<div id="viewport">
    <button class="nav-btn btn-prev" id="prevBtn">❮</button>
    
    <div id="my-book"></div>

    <button class="nav-btn btn-next" id="nextBtn">❯</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    
    // DYNAMIC PARAMETERS: No more hardcoding.
    const driveId = urlParams.get('id');
    const githubFileName = urlParams.get('pdf');

    async function init() {
        let fetchUrl = '';

        // 1. Determine Source (GitHub Raw vs Google Drive)
        if (githubFileName) {
            const rawGithubPath = 'https://raw.githubusercontent.com/PandawaPlatform/flipbook/main/' + githubFileName;
            fetchUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(rawGithubPath);
        } else if (driveId) {
            fetchUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        } else {
            document.getElementById('loader').innerHTML = "No PDF source provided.";
            return;
        }

        try {
            const pdf = await pdfjsLib.getDocument(fetchUrl).promise;
            const bookDiv = document.getElementById('my-book');
            
            // 2. Anti-Stretch Dimension Calculation
            const firstPage = await pdf.getPage(1);
            const tempViewport = firstPage.getViewport({ scale: 1 });
            const ratio = tempViewport.width / tempViewport.height;

            let containerH = window.innerHeight * 0.95;
            let containerW = containerH * ratio;

            // Ensure it fits the screen width for 2-page view
            if (containerW > window.innerWidth * 0.45) {
                containerW = window.innerWidth * 0.45;
                containerH = containerW / ratio;
            }

            // 3. Render Pages
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const renderViewport = page.getPageViewport({ scale: 2 }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                
                canvas.height = renderViewport.height;
                canvas.width = renderViewport.width;

                await page.render({ canvasContext: context, viewport: renderViewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            bookDiv.style.visibility = 'visible';

            // 4. PageFlip Config (Fixed Size = No Stretching)
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(containerW),
                height: Math.round(containerH),
                size: "fixed", 
                minWidth: 300,
                maxWidth: 2000,
                minHeight: 400,
                maxHeight: 2000,
                drawShadow: true,
                showCover: true,
                usePortrait: false,
                startPage: 0,
                flippingTime: 1000,
                mobileScrollSupport: false,
                clickEventForward: false,
                useMouseEvents: true
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
            document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "Error loading document. Please check the file path.";
        }
    }

    init();

    window.addEventListener('resize', () => {
        location.reload(); 
    });
</script>
</body>
</html>
