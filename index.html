<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Flipbook Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        
        #my-book { margin: auto; }

        .page { background: white; width: 100%; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        
        /* ADJUSTMENT: Remove 100% width/height to stop stretching. Use CSS scaling for sharpness. */
        canvas { 
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text">Rendering HD Text...</div>
</div>

<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const log = (msg) => console.log(`[Flipbook Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";
        if (fileUrl) {
            let cleanPath = decodeURIComponent(fileUrl);
            if (cleanPath.includes("github.com") && cleanPath.includes("/blob/")) {
                finalUrl = cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            } else if (cleanPath.startsWith("http")) {
                finalUrl = cleanPath;
            } else {
                const currentDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                finalUrl = currentDir + "/" + cleanPath;
            }
            finalUrl = encodeURI(finalUrl);
        } else if (driveId) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        }

        try {
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            bookDiv.innerHTML = ''; 

            const firstPage = await pdf.getPage(1);
            const viewportOrig = firstPage.getViewport({ scale: 1 });
            
            // ADJUSTMENT: Calculate the display size based on screen
            const screenW = window.innerWidth * 0.9;
            const screenH = window.innerHeight * 0.9;
            const ratio = viewportOrig.width / viewportOrig.height;
            
            // Fixed base dimensions for the library
            let displayH = screenH;
            let displayW = displayH * ratio;

            if (displayW * 2 > screenW) {
                displayW = screenW / 2;
                displayH = displayW / ratio;
            }

            // High-Res Render Scale (DPR Aware)
            const dpr = window.devicePixelRatio || 1;
            const renderScale = 2.5 * dpr; 

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: renderScale }); 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false, desynchronized: true });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ 
                    canvasContext: context, 
                    viewport: viewport,
                    intent: 'print'
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('canvas-container').style.opacity = '1';
            
            // ADJUSTMENT: size: "fixed" with calculated dimensions stops the stretching
            const pageFlip = new St.PageFlip(bookDiv, {
                width: Math.round(displayW), 
                height: Math.round(displayH),
                size: "fixed", 
                showCover: true, 
                usePortrait: false, // Force spread mode for better clarity
                mobileScrollSupport: true,
                maxShadowOpacity: 0.1
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
        } catch (err) {
            document.getElementById('load-text').innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        }
    }
    init();
</script>
</body>
</html>
