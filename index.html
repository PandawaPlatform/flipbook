<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Flipbook Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        #canvas-container { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        .page { background: white; width: 100%; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
    </style>
</head>
<body>

<div id="loader"><div id="load-text">Initializing Pandawa Reader...</div></div>
<div id="canvas-container"><div id="my-book"></div></div>

<script>
    // 1. FIXED: Define the log function so the app doesn't crash
    const log = (msg) => console.log(`[Flipbook Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";

        if (fileUrl) {
            log("Processing PDF from GitHub...");
            
            // 2. FIXED: Convert standard GitHub links to RAW links automatically
            // This turns "github.com/.../blob/..." into "raw.githubusercontent.com/..."
            let cleanUrl = fileUrl;
            if (cleanUrl.includes("github.com") && cleanUrl.includes("/blob/")) {
                cleanUrl = cleanUrl.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            }
            
            // 3. FIXED: Handle spaces in filenames (e.g., "Pengantar Awal.pdf")
            finalUrl = encodeURI(cleanUrl); 
        } else if (driveId) {
            log("Processing PDF from Google Drive...");
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        } else {
            document.getElementById('load-text').innerText = "Error: No PDF source specified.";
            return;
        }

        try {
            log(`Attempting to fetch: ${finalUrl}`);
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            const pageFlip = new St.PageFlip(bookDiv, {
                width: 550, height: 800, size: "stretch",
                showCover: true, usePortrait: true, mobileScrollSupport: true
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            log("Flipbook loaded successfully!");
            
        } catch (err) {
            log(`CRITICAL ERROR: ${err.message}`);
            document.getElementById('load-text').innerHTML = `<span style="color:red">Failed to load flipbook.</span><br><small>${err.message}</small>`;
        }
    }
    init();
</script>
</body>
</html>
