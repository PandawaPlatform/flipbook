<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Flipbook Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        
        .page { background: white; width: 100%; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* ADJUSTMENT: Force the browser to render the canvas with high contrast sharpness */
        canvas { width: 100%; height: 100%; image-rendering: -webkit-optimize-contrast; }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text">Initializing Pandawa Reader...</div>
</div>

<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const log = (msg) => console.log(`[Flipbook Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";

        if (fileUrl) {
            log("Processing PDF source...");
            let cleanPath = decodeURIComponent(fileUrl);
            
            if (cleanPath.includes("github.com") && cleanPath.includes("/blob/")) {
                finalUrl = cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            } else if (cleanPath.startsWith("http")) {
                finalUrl = cleanPath;
            } else {
                const currentDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                finalUrl = currentDir + "/" + cleanPath;
            }
            finalUrl = encodeURI(finalUrl);

        } else if (driveId) {
            log("Processing Google Drive ID...");
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        } else {
            document.getElementById('load-text').innerText = "Error: No PDF source specified.";
            return;
        }

        try {
            log(`Fetching from: ${finalUrl}`);
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            bookDiv.innerHTML = ''; 

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                
                // ADJUSTMENT: Set scale to 2.0 for High Definition text sharpness
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                
                // Keep alpha: false for performance, but the 2.0 scale handles the blur
                const context = canvas.getContext('2d', { alpha: false });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('canvas-container').style.opacity = '1';
            
            const pageFlip = new St.PageFlip(bookDiv, {
                width: 550, height: 800, 
                size: "stretch",
                showCover: true, 
                usePortrait: true, 
                mobileScrollSupport: true,
                maxShadowOpacity: 0.2 // Reduced shadow to keep the 2.0 scale animation smooth
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            log("Flipbook loaded!");
            
        } catch (err) {
            log(`CRITICAL ERROR: ${err.message}`);
            document.getElementById('load-text').innerHTML = `<span style="color:red">Failed to load PDF.</span><br><small>${err.message}</small>`;
        }
    }
    init();
</script>
</body>
</html>
