<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandawa Pro Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        /* CSS ADJUSTMENT: Ensure the black background fills everything perfectly */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        #canvas-container { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; 
            opacity: 0; transition: opacity 0.8s ease; 
        }
        
        /* ADJUSTMENT: Force the flipbook to be large */
        #my-book { width: 100%; height: 100%; }

        .page { background: white; box-shadow: 0 0 30px rgba(0,0,0,0.7); overflow: hidden; }
        
        /* FIX: High-quality image rendering for crisp text edges */
        canvas { 
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        .spinner { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-text">Rendering Ultra-HD Content...</div>
</div>

<div id="canvas-container"><div id="my-book"></div></div>

<script>
    const log = (msg) => console.log(`[Pandawa Log]: ${msg}`);

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const driveId = urlParams.get('id'); 
    const fileUrl = urlParams.get('pdf'); 

    async function init() {
        let finalUrl = "";
        if (fileUrl) {
            let cleanPath = decodeURIComponent(fileUrl);
            if (cleanPath.includes("github.com")) {
                finalUrl = cleanPath.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            } else {
                const currentDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                finalUrl = currentDir + "/" + cleanPath;
            }
            finalUrl = encodeURI(finalUrl);
        } else if (driveId) {
            finalUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${driveId}`);
        }

        try {
            const loadingTask = pdfjsLib.getDocument(finalUrl);
            const pdf = await loadingTask.promise;
            const bookDiv = document.getElementById('my-book');
            bookDiv.innerHTML = ''; 

            const firstPage = await pdf.getPage(1);
            const viewportBase = firstPage.getViewport({ scale: 1 });
            
            // ULTRA-HD FIX: Increase scale to 4.0 for extreme text clarity
            const dpr = window.devicePixelRatio || 1;
            const hdScale = 4.0; 

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: hdScale }); 
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false, desynchronized: true });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ 
                    canvasContext: context, 
                    viewport: viewport,
                    intent: 'print' // Best for sharp text rendering
                }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.appendChild(canvas);
                bookDiv.appendChild(pageDiv);
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('canvas-container').style.opacity = '1';
            
            // ADJUSTMENT: Use the PDF's native ratio but allow it to STRETCH to fill your screen
            const pageFlip = new St.PageFlip(bookDiv, {
                width: viewportBase.width, 
                height: viewportBase.height,
                size: "stretch", // Stretch + Native Width/Height = Perfect Fit
                showCover: true, 
                usePortrait: true, 
                mobileScrollSupport: true,
                maxShadowOpacity: 0.1,
                flippingTime: 1000 // Smoother flip speed
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
        } catch (err) {
            document.getElementById('load-text').innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        }
    }
    init();
</script>
</body>
</html>
